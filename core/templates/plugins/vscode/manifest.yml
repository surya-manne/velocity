# Velocity plugin manifest template for VS Code / GitHub Copilot.
# Placeholders: {{VELOCITY_VERSION}}, {{PLUGIN_TARGET}}, {{ENTRY_FILE}}, {{SYNC_FILE}}, {{GENERATED_AT}}.
version: "{{VELOCITY_VERSION}}"
plugin_target: "{{PLUGIN_TARGET}}"
assistant: vscode_copilot
generated_at: "{{GENERATED_AT}}"
entry_file: "{{ENTRY_FILE}}"
sync_file: "{{SYNC_FILE}}"
invocation:
  init: "#velocity-init"
  sync: "#velocity-sync"
generated_assets:
  - .github/copilot-instructions.md
  - AGENTS.md
  - .github/prompts/