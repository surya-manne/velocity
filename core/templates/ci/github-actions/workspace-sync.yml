name: Velocity Workspace Sync

# Velocity CI/CD Integration — Workspace Repository
#
# This workflow lives in the velocity-workspace repository.
# It fires when workspace-level assets change and dispatches repository_dispatch
# events to all connected downstream repositories, triggering their /sync cycle.
#
# Prerequisites:
#   1. Add VELOCITY_WEBHOOK_SECRET to this repository's GitHub secrets
#   2. Each downstream repository must have the velocity-downstream-sync.yml
#      workflow installed (see templates/ci/github-actions/downstream-sync.yml)
#   3. Each downstream repository must grant this workflow a fine-grained PAT
#      with: repository_dispatch write permission
#      Store the token as VELOCITY_DOWNSTREAM_PAT in this repo's secrets.
#
# What triggers downstream regeneration:
#   - CONTEXT.md update in any registered bounded context
#   - workspace.md change (repository added/removed/modified)
#   - Shared guardrails changed
#   - Shared project-context standards changed
#   - Workspace knowledge base updated

on:
  push:
    branches:
      - main
      - master
    paths:
      # Workspace registration changes
      - ".velocity/workspace.md"
      - ".velocity/context-map.md"
      - ".velocity/workspace-intelligence/**"

      # Shared standards changes
      - ".velocity/project-context/**"

      # Shared guardrails changes
      - ".velocity/guardrails/workspace.md"

      # Bounded context language changes
      - ".velocity/contexts/**/CONTEXT.md"
      - "**/CONTEXT.md"
      - ".velocity/artifacts/adrs/**"

      # Shared knowledge base changes
      - ".velocity/knowledge-base/**"

  workflow_dispatch:
    inputs:
      force_propagate_all:
        description: "Force propagation to all registered repositories (ignore delta detection)"
        type: boolean
        default: false
      target_repository:
        description: "Propagate to a single repository only (leave empty for all)"
        type: string
        default: ""

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Detect what changed
  # ─────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Workspace Changes
    runs-on: ubuntu-latest
    outputs:
      context_changed: ${{ steps.detect.outputs.context_changed }}
      guardrails_changed: ${{ steps.detect.outputs.guardrails_changed }}
      standards_changed: ${{ steps.detect.outputs.standards_changed }}
      workspace_yaml_changed: ${{ steps.detect.outputs.workspace_yaml_changed }}
      knowledge_changed: ${{ steps.detect.outputs.knowledge_changed }}
      changed_contexts: ${{ steps.detect.outputs.changed_contexts }}
      should_propagate: ${{ steps.detect.outputs.should_propagate }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed asset types
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1...HEAD 2>/dev/null || echo "")

          CONTEXT_CHANGED=false
          GUARDRAILS_CHANGED=false
          STANDARDS_CHANGED=false
          WORKSPACE_YAML_CHANGED=false
          KNOWLEDGE_CHANGED=false

          echo "$CHANGED" | grep -q "CONTEXT\.md" && CONTEXT_CHANGED=true || true
          echo "$CHANGED" | grep -q "^\.velocity/guardrails/" && GUARDRAILS_CHANGED=true || true
          echo "$CHANGED" | grep -q "^\.velocity/project-context/" && STANDARDS_CHANGED=true || true
          echo "$CHANGED" | grep -q "^\.velocity/workspace\.md\|^\.velocity/context-map\.md" && WORKSPACE_YAML_CHANGED=true || true
          echo "$CHANGED" | grep -q "^\.velocity/knowledge-base/" && KNOWLEDGE_CHANGED=true || true

          # Extract which context IDs changed (from .velocity/contexts/<id>/ or CONTEXT.md paths)
          CHANGED_CONTEXTS=$(echo "$CHANGED" | grep "CONTEXT\.md" | sed 's|.*/contexts/\([^/]*\)/.*|\1|;s|CONTEXT\.md.*||' | sort -u | tr '\n' ',' | sed 's/,$//')

          if $CONTEXT_CHANGED || $GUARDRAILS_CHANGED || $STANDARDS_CHANGED || $WORKSPACE_YAML_CHANGED || $KNOWLEDGE_CHANGED || ${{ github.event.inputs.force_propagate_all == 'true' }}; then
            SHOULD_PROPAGATE=true
          else
            SHOULD_PROPAGATE=false
          fi

          echo "context_changed=$CONTEXT_CHANGED" >> $GITHUB_OUTPUT
          echo "guardrails_changed=$GUARDRAILS_CHANGED" >> $GITHUB_OUTPUT
          echo "standards_changed=$STANDARDS_CHANGED" >> $GITHUB_OUTPUT
          echo "workspace_yaml_changed=$WORKSPACE_YAML_CHANGED" >> $GITHUB_OUTPUT
          echo "knowledge_changed=$KNOWLEDGE_CHANGED" >> $GITHUB_OUTPUT
          echo "changed_contexts=$CHANGED_CONTEXTS" >> $GITHUB_OUTPUT
          echo "should_propagate=$SHOULD_PROPAGATE" >> $GITHUB_OUTPUT

      - name: Log detection results
        run: |
          echo "Workspace change detection:"
          echo "  CONTEXT.md changed:     ${{ steps.detect.outputs.context_changed }}"
          echo "  Guardrails changed:     ${{ steps.detect.outputs.guardrails_changed }}"
          echo "  Standards changed:      ${{ steps.detect.outputs.standards_changed }}"
          echo "  workspace.md changed: ${{ steps.detect.outputs.workspace_yaml_changed }}"
          echo "  Knowledge base changed: ${{ steps.detect.outputs.knowledge_changed }}"
          echo "  Changed contexts:       ${{ steps.detect.outputs.changed_contexts }}"
          echo "  Should propagate:       ${{ steps.detect.outputs.should_propagate }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Read registered repositories from workspace.md
  # ─────────────────────────────────────────────────────────────────────────────
  read-repositories:
    name: Read Registered Repositories
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.should_propagate == 'true'
    outputs:
      repositories: ${{ steps.read.outputs.repositories }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse workspace.md
        id: read
        run: |
          if [ ! -f ".velocity/workspace.md" ]; then
            echo "::error::.velocity/workspace.md not found. Run /workspace-setup to initialize this workspace."
            exit 1
          fi

          # Extract repository IDs and their sync strategies
          # Using Python for reliable YAML parsing
          python3 - << 'EOF'
          import yaml, json, os

          with open('.velocity/workspace.md') as f:
              workspace = yaml.safe_load(f)

          repos = workspace.get('repositories', [])
          target = os.environ.get('TARGET_REPOSITORY', '')

          # Filter by target if specified
          if target:
              repos = [r for r in repos if r['id'] == target]

          # Only include repos with ci_webhook or on_push sync that have adapters
          propagate_to = []
          for repo in repos:
              sync = repo.get('sync', 'on_pull')
              if sync in ('ci_webhook', 'on_push') or os.environ.get('FORCE_ALL') == 'true':
                  propagate_to.append({
                      'id': repo['id'],
                      'name': repo['name'],
                      'url': repo.get('url', ''),
                      'sync': sync
                  })

          print(f"Repositories to notify: {len(propagate_to)}")
          for r in propagate_to:
              print(f"  - {r['id']} ({r['sync']})")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"repositories={json.dumps(propagate_to)}\n")
          EOF
        env:
          TARGET_REPOSITORY: ${{ github.event.inputs.target_repository }}
          FORCE_ALL: ${{ github.event.inputs.force_propagate_all }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Dispatch sync events to downstream repositories
  # ─────────────────────────────────────────────────────────────────────────────
  dispatch-sync:
    name: Dispatch Sync to Downstream Repositories
    runs-on: ubuntu-latest
    needs: [detect-changes, read-repositories]
    if: needs.detect-changes.outputs.should_propagate == 'true'
    steps:
      - name: Dispatch repository_dispatch to each downstream repo
        run: |
          REPOS='${{ needs.read-repositories.outputs.repositories }}'
          CHANGED_CONTEXTS='${{ needs.detect-changes.outputs.changed_contexts }}'
          COMMIT_SHA='${{ github.sha }}'
          WORKSPACE_NAME=$(cat .velocity/workspace.md | python3 -c "import yaml,sys; d=yaml.safe_load(sys.stdin); print(d.get('workspace',{}).get('name',''))" 2>/dev/null || echo "workspace")

          echo "$REPOS" | python3 - << 'EOF'
          import json, subprocess, sys, os

          repos = json.loads(os.environ.get('REPOS', '[]'))
          if not repos:
              print("No repositories configured for ci_webhook sync. Skipping dispatch.")
              print("To enable automatic propagation, set sync: ci_webhook in workspace.md for target repos.")
              sys.exit(0)

          token = os.environ.get('VELOCITY_DOWNSTREAM_PAT', '')
          if not token:
              print("::warning::VELOCITY_DOWNSTREAM_PAT secret not set. Cannot dispatch to downstream repos.")
              print("Add a fine-grained PAT with repository_dispatch write permission as VELOCITY_DOWNSTREAM_PAT.")
              sys.exit(0)

          for repo in repos:
              repo_url = repo['url']
              # Extract org/repo from SSH or HTTPS URL
              if repo_url.startswith('git@github.com:'):
                  org_repo = repo_url.replace('git@github.com:', '').replace('.git', '')
              elif 'github.com/' in repo_url:
                  org_repo = repo_url.split('github.com/')[-1].replace('.git', '')
              else:
                  print(f"::warning::Cannot parse GitHub URL for {repo['id']}: {repo_url}. Skipping.")
                  continue

              payload = {
                  "event_type": "velocity-workspace-sync",
                  "client_payload": {
                      "workspace_commit": os.environ.get('COMMIT_SHA', ''),
                      "workspace_name": os.environ.get('WORKSPACE_NAME', ''),
                      "changed_contexts": os.environ.get('CHANGED_CONTEXTS', ''),
                      "context_changed": os.environ.get('CONTEXT_CHANGED', 'false'),
                      "guardrails_changed": os.environ.get('GUARDRAILS_CHANGED', 'false'),
                      "standards_changed": os.environ.get('STANDARDS_CHANGED', 'false')
                  }
              }

              result = subprocess.run(
                  ['curl', '-s', '-o', '/dev/null', '-w', '%{http_code}',
                   '-X', 'POST',
                   f'https://api.github.com/repos/{org_repo}/dispatches',
                   '-H', f'Authorization: Bearer {token}',
                   '-H', 'Accept: application/vnd.github+json',
                   '-H', 'Content-Type: application/json',
                   '-d', json.dumps(payload)],
                  capture_output=True, text=True
              )
              status = result.stdout.strip()
              if status == '204':
                  print(f"✅ Dispatched sync to {repo['id']} ({org_repo})")
              else:
                  print(f"::warning::Failed to dispatch to {repo['id']} ({org_repo}): HTTP {status}")
          EOF
        env:
          REPOS: ${{ needs.read-repositories.outputs.repositories }}
          CHANGED_CONTEXTS: ${{ needs.detect-changes.outputs.changed_contexts }}
          CONTEXT_CHANGED: ${{ needs.detect-changes.outputs.context_changed }}
          GUARDRAILS_CHANGED: ${{ needs.detect-changes.outputs.guardrails_changed }}
          STANDARDS_CHANGED: ${{ needs.detect-changes.outputs.standards_changed }}
          COMMIT_SHA: ${{ github.sha }}
          VELOCITY_DOWNSTREAM_PAT: ${{ secrets.VELOCITY_DOWNSTREAM_PAT }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Write propagation record to workspace
  # ─────────────────────────────────────────────────────────────────────────────
  record-propagation:
    name: Record Propagation Event
    runs-on: ubuntu-latest
    needs: [detect-changes, dispatch-sync]
    if: always() && needs.detect-changes.outputs.should_propagate == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write propagation record
        run: |
          mkdir -p .velocity/workspace-intelligence
          cat > .velocity/workspace-intelligence/last-propagation.md << EOF
          # Velocity Workspace Propagation Record

          **Propagated:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Commit:** ${{ github.sha }}

          ## Changes Detected

          - CONTEXT.md changed: ${{ needs.detect-changes.outputs.context_changed }}
          - Guardrails changed: ${{ needs.detect-changes.outputs.guardrails_changed }}
          - Standards changed: ${{ needs.detect-changes.outputs.standards_changed }}
          - workspace.md changed: ${{ needs.detect-changes.outputs.workspace_yaml_changed }}
          - Changed contexts: ${{ needs.detect-changes.outputs.changed_contexts }}

          ## Dispatch Status

          Downstream repositories have been notified via repository_dispatch.
          Each connected repository will pull workspace intelligence on their next sync cycle.

          To immediately sync a specific repository, run /sync inside that repository's AI assistant.
          EOF

          git config user.name "Velocity CI"
          git config user.email "velocity-ci@noreply.github.com"
          git add .velocity/workspace-intelligence/last-propagation.md
          git diff --staged --quiet || git commit -m "chore: Velocity workspace propagation record — $(date -u +%Y-%m-%d)"
          git push
