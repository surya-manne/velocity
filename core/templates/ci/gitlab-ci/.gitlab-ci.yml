# Velocity CI/CD Integration — GitLab CI
#
# Install this file as .gitlab-ci.yml (or include it in an existing pipeline).
#
# What this pipeline does:
#   - Runs Velocity guardrail checks on every Merge Request
#   - Detects Tier 1 stack changes on push to main and writes a regeneration notice
#   - Runs a weekly Tier 2 semantic scan notification
#
# Tier 1 triggers (file-based, high confidence, evaluated on every push):
#   - Dependency manifest changes (package.json, pom.xml, go.mod, requirements.txt, etc.)
#   - New service or module directory added (structural change)
#   - New CONTEXT.md created
#   - New ADR added to .velocity/artifacts/adrs/
#   - Guardrails config modified
#
# Tier 2 triggers (semantic, requires developer-initiated /sync):
#   - Architecture shifts (new API style, messaging pattern, persistence layer)
#   - Significant new domain concepts
#   These are NOT evaluated in this pipeline — they require /sync inside the assistant.
#
# Prerequisites:
#   - Add VELOCITY_GITLAB_TOKEN to your GitLab CI/CD variables (project or group level)
#     with api scope — needed for committing the regeneration notice.
#   - For workspace-connected repositories: also set VELOCITY_WORKSPACE_URL

stages:
  - validate
  - regenerate
  - notify

# ─────────────────────────────────────────────────────────────────────────────
# Variables
# ─────────────────────────────────────────────────────────────────────────────
variables:
  GIT_DEPTH: 0  # Full history for diff analysis
  VELOCITY_BOT_NAME: "Velocity CI"
  VELOCITY_BOT_EMAIL: "velocity-ci@noreply.gitlab.com"

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Guardrail Validation (Merge Requests only)
# ─────────────────────────────────────────────────────────────────────────────
velocity-guardrails:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - |
      if [ ! -f ".velocity/guardrails/default.md" ]; then
        echo "WARNING: No .velocity/guardrails/default.md found. Skipping Velocity guardrail checks."
        echo "Run /setup in your AI coding assistant to initialize Velocity."
        exit 0
      fi

    # ── Check 1: Vertical slice (no horizontal-only MRs) ──────────────────
    - |
      echo "=== Velocity Guardrail Check 1: Vertical Slice ==="
      CHANGED_FILES=$(git diff --name-only origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD)

      HAS_MIGRATION=$(echo "$CHANGED_FILES" | grep -c "migration\|schema\|flyway\|liquibase\|alembic" || true)
      HAS_API=$(echo "$CHANGED_FILES" | grep -c "controller\|route\|handler\|resolver\|endpoint\|router" || true)
      HAS_UI=$(echo "$CHANGED_FILES" | grep -c "component\|page\|view\|screen\|\.tsx\|\.jsx\|\.vue\|\.svelte" || true)
      HAS_SERVICE=$(echo "$CHANGED_FILES" | grep -c "service\|domain\|usecase\|command\|query\|aggregate" || true)
      HAS_TEST=$(echo "$CHANGED_FILES" | grep -c "\.test\.\|\.spec\.\|_test\.\|Test\." || true)

      LAYER_COUNT=0
      [ "$HAS_MIGRATION" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))
      [ "$HAS_API" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))
      [ "$HAS_UI" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))
      [ "$HAS_SERVICE" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))

      if [ "$LAYER_COUNT" -eq 1 ] && [ "$HAS_TEST" -eq 0 ]; then
        echo "FAIL: This MR appears to touch only one layer without tests."
        echo "Velocity requires vertical slices: each MR must span all layers it touches (UI + API + persistence + tests)."
        echo "If this is an intentional single-layer change, add tests and ensure other layers are covered in this MR."
        exit 1
      fi
      echo "PASS: MR spans $LAYER_COUNT layers."

    # ── Check 2: Test coverage for changed source files ───────────────────
    - |
      echo "=== Velocity Guardrail Check 2: Test Coverage ==="
      CHANGED_SOURCE=$(git diff --name-only origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD \
        | grep -v "test\|spec\|__test__" \
        | grep "\.\(ts\|tsx\|js\|jsx\|py\|java\|go\|rb\|cs\)$" || true)

      if [ -n "$CHANGED_SOURCE" ]; then
        MISSING_TESTS=""
        while IFS= read -r file; do
          basename="${file%.*}"
          if ! git diff --name-only origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD \
            | grep -q "${basename}\.test\.\|${basename}\.spec\.\|${basename}_test\.\|Test${basename##*/}"; then
            MISSING_TESTS="$MISSING_TESTS  $file"
          fi
        done <<< "$CHANGED_SOURCE"

        if [ -n "$MISSING_TESTS" ]; then
          echo "WARNING: The following changed source files may be missing test coverage:"
          echo "$MISSING_TESTS"
          echo "Ensure tests exist for every behavior change in this MR."
        else
          echo "PASS: All changed source files have corresponding test files."
        fi
      else
        echo "PASS: No source files changed (or only test files changed)."
      fi

    # ── Check 3: CONTEXT.md term drift (changed files) ───────────────────
    - |
      echo "=== Velocity Guardrail Check 3: CONTEXT.md Term Drift ==="
      if [ -f "CONTEXT.md" ] || [ -f ".velocity/artifacts/context/CONTEXT.md" ]; then
        echo "CONTEXT.md found. Language drift check is performed by the /validate skill inside the AI assistant."
        echo "Run /validate for full term-by-term drift analysis with line-level specifics."
        echo "PASS (static CI check — full analysis requires AI assistant)"
      else
        echo "SKIP: No CONTEXT.md found. Run /grill-with-docs to create one."
      fi

    # ── Check 4: Secrets scan ─────────────────────────────────────────────
    - |
      echo "=== Velocity Guardrail Check 4: Secrets Scan ==="
      CHANGED_FILES=$(git diff --name-only origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD)
      SECRET_FOUND=false

      # Scan for common secret patterns in the diff
      if git diff origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD -- $CHANGED_FILES \
        | grep -qiE '(api_key|secret_key|aws_secret|private_key|password|token)\s*[:=]\s*["\x27][A-Za-z0-9+/]{20,}'; then
        echo "FAIL: Potential secret detected in MR diff."
        echo "Secrets must not be committed to source control."
        echo "Use environment variables or a secrets manager (Vault, AWS Secrets Manager, GitLab CI/CD variables)."
        SECRET_FOUND=true
      fi

      if [ "$SECRET_FOUND" = "false" ]; then
        echo "PASS: No obvious secrets detected in diff."
      else
        exit 1
      fi

    # ── Check 5: Breaking change detection ───────────────────────────────
    - |
      echo "=== Velocity Guardrail Check 5: Breaking Change Detection ==="
      DIFF=$(git diff origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD)

      # Check for removed route definitions
      REMOVED_ROUTES=$(echo "$DIFF" | grep -E "^\-.*(@(Get|Post|Put|Delete|Patch)Mapping|app\.(get|post|put|delete|patch)\(|router\.(get|post|put|delete|patch)\(|path:\s*/)" || true)

      # Check for dropped columns in migrations
      DROPPED_COLUMNS=$(echo "$DIFF" | grep -iE "^\+.*(drop\s+column|drop_column|remove_column)" || true)

      # Check for removed fields in schema/DTO files
      REMOVED_FIELDS=$(git diff --name-only origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD \
        | grep -iE "(dto|schema|type|interface|model)\.(ts|java|py|go)$" || true)

      BREAKING_FOUND=false

      if [ -n "$REMOVED_ROUTES" ]; then
        echo "WARNING: Possible route removal detected. If this is an API breaking change, bump the API version."
        echo "$REMOVED_ROUTES" | head -5
        BREAKING_FOUND=true
      fi

      if [ -n "$DROPPED_COLUMNS" ]; then
        echo "WARNING: Column drop detected in migration. Ensure a down migration exists and all consumers are updated."
        echo "$DROPPED_COLUMNS" | head -5
        BREAKING_FOUND=true
      fi

      if [ "$BREAKING_FOUND" = "false" ]; then
        echo "PASS: No obvious breaking changes detected."
      else
        echo ""
        echo "If these are intentional breaking changes, add 'breaking-change' label to this MR"
        echo "and document the migration path in the MR description."
      fi

    # ── Check 6: API versioning ───────────────────────────────────────────
    - |
      echo "=== Velocity Guardrail Check 6: API Versioning ==="
      NEW_ENDPOINTS=$(git diff origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD \
        | grep -E "^\+.*(@(Get|Post|Put|Delete|Patch)Mapping|app\.(get|post|put|delete|patch)\(|router\.(get|post|put|delete|patch)\()" || true)

      if [ -n "$NEW_ENDPOINTS" ]; then
        # Check if new endpoints include a version prefix
        UNVERSIONED=$(echo "$NEW_ENDPOINTS" | grep -v "/v[0-9]/" || true)
        if [ -n "$UNVERSIONED" ]; then
          echo "WARNING: New API endpoints may be missing version prefix (/v1/, /v2/, etc.):"
          echo "$UNVERSIONED" | head -5
          echo "Versioned endpoints ensure backward compatibility when the API evolves."
        else
          echo "PASS: All new endpoints appear to be versioned."
        fi
      else
        echo "PASS: No new API endpoints detected."
      fi

  after_script:
    - echo "Velocity guardrail checks complete. See job log for details."

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Tier 1 Regeneration Notice (push to main only)
# ─────────────────────────────────────────────────────────────────────────────
velocity-regeneration-notice:
  stage: regenerate
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")
  script:
    - |
      CHANGED=$(git diff --name-only HEAD~1...HEAD 2>/dev/null || echo "")

      DEPENDENCY_CHANGE=false
      STRUCTURAL_CHANGE=false
      GUARDRAIL_CHANGE=false
      CONTEXT_CHANGE=false

      echo "$CHANGED" | grep -qE "^(package\.json|pom\.xml|go\.mod|requirements\.txt|Gemfile|Cargo\.toml|build\.gradle|pyproject\.toml)" \
        && DEPENDENCY_CHANGE=true || true
      echo "$CHANGED" | grep -qE "^(services/|apps/|packages/)" \
        && STRUCTURAL_CHANGE=true || true
      echo "$CHANGED" | grep -q "CONTEXT\.md" \
        && CONTEXT_CHANGE=true || true
      echo "$CHANGED" | grep -q "^\.velocity/artifacts/adrs/" \
        && CONTEXT_CHANGE=true || true
      echo "$CHANGED" | grep -q "^\.velocity/guardrails/" \
        && GUARDRAIL_CHANGE=true || true

      echo "Velocity Tier 1 trigger detection:"
      echo "  Dependency change:  $DEPENDENCY_CHANGE"
      echo "  Structural change:  $STRUCTURAL_CHANGE"
      echo "  Guardrail change:   $GUARDRAIL_CHANGE"
      echo "  Context/ADR change: $CONTEXT_CHANGE"

      if $DEPENDENCY_CHANGE || $STRUCTURAL_CHANGE || $GUARDRAIL_CHANGE || $CONTEXT_CHANGE; then
        echo ""
        echo "Qualifying Tier 1 change detected. Writing regeneration notice."

        mkdir -p .velocity
        cat > .velocity/REGEN_NOTICE.md << EOF
# Velocity Regeneration Notice

**Triggered:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
**Commit:** ${CI_COMMIT_SHA}
**Pipeline:** ${CI_PIPELINE_URL}

## Trigger Reasons

$([ "$DEPENDENCY_CHANGE" = "true" ] && echo "- Dependency manifest changed")
$([ "$STRUCTURAL_CHANGE" = "true" ] && echo "- Structural change (new service/module directory)")
$([ "$GUARDRAIL_CHANGE" = "true" ] && echo "- Guardrail configuration changed")
$([ "$CONTEXT_CHANGE" = "true" ] && echo "- CONTEXT.md or ADR changed")

## Action Required

Run \`/sync\` in your AI coding assistant to regenerate Velocity assets with the latest stack intelligence.

Until you run \`/sync\`:
- Agents may be operating with stale stack awareness
- New guardrail changes are not yet reflected in hooks.json
- New domain terms are not yet injected into agent system prompts

This notice will be removed after the next successful \`/sync\` run.
EOF

        git config user.name "${VELOCITY_BOT_NAME}"
        git config user.email "${VELOCITY_BOT_EMAIL}"
        git remote set-url origin "https://gitlab-ci-token:${VELOCITY_GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git add .velocity/REGEN_NOTICE.md
        git diff --staged --quiet || git commit -m "chore: Velocity regeneration notice — Tier 1 trigger detected [skip ci]"
        git push origin HEAD:${CI_COMMIT_BRANCH}
      else
        echo "No qualifying Tier 1 changes detected. Skipping regeneration notice."
      fi

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: Weekly Tier 2 Scan Notification (scheduled only)
# ─────────────────────────────────────────────────────────────────────────────
velocity-tier2-scan:
  stage: notify
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - |
      echo "Velocity weekly Tier 2 scan"
      echo ""
      echo "Tier 2 signals require semantic analysis — they cannot be reliably detected by file diff alone."
      echo ""
      echo "Run /sync in your AI coding assistant to perform the full semantic re-scan."
      echo ""
      echo "Tier 2 signals to check for:"
      echo "  - New API style adopted (REST → GraphQL, REST → gRPC)"
      echo "  - New messaging pattern (first Kafka producer/consumer added)"
      echo "  - New persistence layer (SQL → NoSQL)"
      echo "  - New architectural pattern (first event sourcing aggregate)"
      echo "  - Significant CONTEXT.md growth (many new domain terms)"
      echo "  - New test framework adopted"
      echo ""
      echo "If significant changes are found, Velocity will update agents and skills accordingly."
      echo ""
      echo "To suppress this reminder, run /sync regularly (weekly during active development)."

# ─────────────────────────────────────────────────────────────────────────────
# Scheduling setup (add to GitLab → CI/CD → Schedules):
#
#   Description: Velocity Tier 2 Scan
#   Interval pattern: 0 9 * * 1   (Monday 9am UTC)
#   Branch: main
#
# ─────────────────────────────────────────────────────────────────────────────
