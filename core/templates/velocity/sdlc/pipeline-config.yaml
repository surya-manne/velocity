# Velocity SDLC — Project-Local Pipeline Configuration
# Schema: schemas/pipeline.schema.json (overrides section)
#
# This file is project-local. It overrides the defaults in pipeline.yaml.
# Only set values you want to change. Unset keys inherit the default.
#
# Generated by: pipeline-init
# Location in consumer repo: .velocity/sdlc/pipeline-config.yaml

# ── Phase Skip Overrides ──────────────────────────────────────────────────────
# List phases that are always skipped for this project.
# Each entry requires a justification string.
# Skips are recorded in pipeline state and surfaced at the next human gate.
#
# phase_skips:
#   - phase_id: design
#     justification: "Trivial features in this repo do not require formal design docs"
#   - phase_id: discovery
#     justification: "Product team manages all discovery externally in Jira"

phase_skips: []

# ── Gate Type Overrides ───────────────────────────────────────────────────────
# Override the gate type for a specific phase.
# Allowed values: automated | human | both
#
# gate_overrides:
#   - phase_id: validate
#     gate_type: automated

gate_overrides: []

# ── Max Revision Attempts ─────────────────────────────────────────────────────
# Maximum number of revision cycles at a human gate before escalation.
# Default is 3. Set lower for stricter governance, higher for exploratory work.
#
max_revision_attempts: 3

# ── RALPH Loop ────────────────────────────────────────────────────────────
# Enable team-level AI improvement feedback.
# When true, a RALPH annotation stub is written after each phase completes.
# Developers fill in quality signals at the next check-in.
# Default: false (opt-in)
#
ralph_enabled: false

# ── Blocking Rules ────────────────────────────────────────────────────────────
# Static cross-feature blocking. Any pipeline listed under `blocked_by`
# will not advance past its current phase until all work_ids in the list
# reach status=approved.
# The loop skill reads this at runtime.
#
# blocking_rules:
#   - work_id: feat-create-policy
#     blocked_by: [feat-domain-model-v2]

blocking_rules: []
