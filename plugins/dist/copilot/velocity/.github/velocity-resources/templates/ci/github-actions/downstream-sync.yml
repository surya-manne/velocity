name: Velocity Downstream Workspace Sync

# Velocity CI/CD Integration — Connected Repository
#
# This workflow lives in repositories CONNECTED to velocity-workspace.
# It fires when the workspace repository dispatches a velocity-workspace-sync
# event, then writes a WORKSPACE_SYNC_NOTICE.md instructing developers to
# run /sync in their AI assistant.
#
# Installation:
#   Copy this file to: .github/workflows/velocity-downstream-sync.yml
#   in any repository registered in velocity-workspace/.velocity/workspace.md
#   with sync: ci_webhook

on:
  repository_dispatch:
    types: [velocity-workspace-sync]

  workflow_dispatch:
    inputs:
      workspace_name:
        description: "Workspace name (for the notice)"
        type: string
        default: "velocity-workspace"

jobs:
  receive-workspace-sync:
    name: Receive Workspace Sync Signal
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract sync payload
        id: payload
        run: |
          WORKSPACE_NAME="${{ github.event.client_payload.workspace_name || github.event.inputs.workspace_name }}"
          WORKSPACE_COMMIT="${{ github.event.client_payload.workspace_commit }}"
          CONTEXT_CHANGED="${{ github.event.client_payload.context_changed }}"
          GUARDRAILS_CHANGED="${{ github.event.client_payload.guardrails_changed }}"
          STANDARDS_CHANGED="${{ github.event.client_payload.standards_changed }}"
          CHANGED_CONTEXTS="${{ github.event.client_payload.changed_contexts }}"

          echo "workspace_name=$WORKSPACE_NAME" >> $GITHUB_OUTPUT
          echo "workspace_commit=$WORKSPACE_COMMIT" >> $GITHUB_OUTPUT
          echo "context_changed=$CONTEXT_CHANGED" >> $GITHUB_OUTPUT
          echo "guardrails_changed=$GUARDRAILS_CHANGED" >> $GITHUB_OUTPUT
          echo "standards_changed=$STANDARDS_CHANGED" >> $GITHUB_OUTPUT
          echo "changed_contexts=$CHANGED_CONTEXTS" >> $GITHUB_OUTPUT

      - name: Log sync signal
        run: |
          echo "Velocity workspace sync signal received from: ${{ steps.payload.outputs.workspace_name }}"
          echo "Workspace commit: ${{ steps.payload.outputs.workspace_commit }}"
          echo "Context changed: ${{ steps.payload.outputs.context_changed }}"
          echo "Guardrails changed: ${{ steps.payload.outputs.guardrails_changed }}"
          echo "Standards changed: ${{ steps.payload.outputs.standards_changed }}"
          echo "Changed contexts: ${{ steps.payload.outputs.changed_contexts }}"

      - name: Write workspace sync notice
        run: |
          mkdir -p .velocity
          WORKSPACE_NAME="${{ steps.payload.outputs.workspace_name }}"
          CHANGED_SUMMARY=""

          if [ "${{ steps.payload.outputs.context_changed }}" = "true" ]; then
            CHANGED_SUMMARY="$CHANGED_SUMMARY\n- Domain language updated (CONTEXT.md changed)"
            if [ -n "${{ steps.payload.outputs.changed_contexts }}" ]; then
              CHANGED_SUMMARY="$CHANGED_SUMMARY: ${{ steps.payload.outputs.changed_contexts }}"
            fi
          fi
          if [ "${{ steps.payload.outputs.guardrails_changed }}" = "true" ]; then
            CHANGED_SUMMARY="$CHANGED_SUMMARY\n- Workspace guardrails updated"
          fi
          if [ "${{ steps.payload.outputs.standards_changed }}" = "true" ]; then
            CHANGED_SUMMARY="$CHANGED_SUMMARY\n- Shared engineering/security/testing standards updated"
          fi

          cat > .velocity/WORKSPACE_SYNC_NOTICE.md << EOF
          # Velocity Workspace Sync Notice

          **Workspace:** ${WORKSPACE_NAME}
          **Detected:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Workspace commit:** ${{ steps.payload.outputs.workspace_commit }}

          ## What Changed

          $(printf "$CHANGED_SUMMARY")

          ## Action Required

          Run \`/sync\` in your AI coding assistant to pull the latest workspace intelligence
          and regenerate your Velocity assets with the updated domain language, guardrails, and standards.

          Until you run \`/sync\`:
          - Your agents may be operating with stale domain language
          - Workspace guardrail changes are not yet enforced
          - Shared standards changes are not yet reflected in generated code

          This notice will be removed after the next successful \`/sync\` run.
          EOF

          git config user.name "Velocity CI"
          git config user.email "velocity-ci@noreply.github.com"
          git add .velocity/WORKSPACE_SYNC_NOTICE.md
          git diff --staged --quiet || git commit -m "chore: Velocity workspace sync notice — ${WORKSPACE_NAME} updated"
          git push
