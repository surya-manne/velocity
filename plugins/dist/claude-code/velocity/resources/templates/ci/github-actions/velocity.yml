name: Velocity Continuous Regeneration

# Velocity CI/CD Integration — Tier 1 triggers (single-repo and connected-repo)
#
# This workflow regenerates Velocity assets when qualifying changes are detected.
# For workspace-connected repositories, it also responds to workspace sync signals.
#
# Tier 1 triggers (file-based, high confidence):
#   - Dependency manifest changes (package.json, pom.xml, go.mod, requirements.txt)
#   - New service or module directory (monorepo structural change)
#   - New CONTEXT.md created
#   - New ADR added to .velocity/artifacts/adrs/
#   - Guardrails config modified
#   - Workspace sync notice received (WORKSPACE_SYNC_NOTICE.md written)
#
# Tier 2 triggers (semantic, requires explicit /sync or scheduled job):
#   - Architecture shifts (new API style, new messaging pattern)
#   - Significant new domain concepts
#   These are NOT evaluated in this workflow — they require a developer-initiated /sync.
#
# Workspace setup:
#   - For velocity-workspace repositories: use workspace-sync.yml instead
#   - For connected repositories: also install downstream-sync.yml

on:
  push:
    branches:
      - main
      - master
    paths:
      # Dependency manifests (Tier 1: dependency_change)
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.md"
      - "yarn.lock"
      - "pom.xml"
      - "**/pom.xml"
      - "build.gradle"
      - "**/build.gradle"
      - "go.mod"
      - "requirements.txt"
      - "pyproject.toml"
      - "Gemfile"
      - "Cargo.toml"

      # Structural changes (Tier 1: structural_change)
      - "**/CONTEXT.md"
      - ".velocity/artifacts/adrs/**"
      - ".velocity/guardrails/**"
      - ".velocity/context-map.md"
      - "services/**"
      - "apps/**"
      - "packages/**"

      # Workspace intelligence changes (Tier 1: workspace_change)
      - ".velocity/workspace-intelligence/**"
      - ".velocity/WORKSPACE_SYNC_NOTICE.md"

  pull_request:
    branches:
      - main
      - master
    types: [opened, synchronize, reopened]

  # Scheduled Tier 2 scan (weekly — semantic architecture shift detection)
  # This job notifies the developer but does not auto-regenerate
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC

  workflow_dispatch:
    inputs:
      force_full_regeneration:
        description: "Force full regeneration (ignore delta detection)"
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 0: Schema Lint (runs on every PR — validates .velocity/ against JSON Schemas)
  # ─────────────────────────────────────────────────────────────────────────────
  schema-lint:
    name: Velocity Schema Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5

      - name: Validate stack.md against project-intelligence schema
        run: |
          if [ -f ".velocity/project-intelligence/stack.md" ]; then
            # Extract YAML frontmatter (between first two --- delimiters) and validate
            python3 - <<'PY'
          import sys, re, json, subprocess, tempfile, os

          path = ".velocity/project-intelligence/stack.md"
          with open(path) as f:
              content = f.read()
          match = re.match(r"^---\n(.*?)\n---", content, re.DOTALL)
          if not match:
              print(f"::warning::No YAML frontmatter found in {path}")
              sys.exit(0)
          import yaml
          data = yaml.safe_load(match.group(1))
          tmp = tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False)
          json.dump(data, tmp)
          tmp.close()
          result = subprocess.run(
              ["ajv", "validate", "-s", "schemas/project-intelligence.schema.json", "-d", tmp.name, "--spec=draft7"],
              capture_output=True, text=True
          )
          os.unlink(tmp.name)
          if result.returncode != 0:
              print(f"::error::stack.md failed schema validation:\n{result.stderr or result.stdout}")
              sys.exit(1)
          print("stack.md — schema valid")
          PY
          else
            echo "::warning::No .velocity/project-intelligence/stack.md found. Skipping schema validation."
          fi

      - name: Validate velocity-config.yml against velocity-config schema
        run: |
          if [ -f ".velocity/velocity-config.yml" ]; then
            python3 - <<'PY'
          import sys, json, subprocess, tempfile, os
          try:
              import yaml
          except ImportError:
              print("::warning::PyYAML not available; skipping velocity-config validation")
              sys.exit(0)
          with open(".velocity/velocity-config.yml") as f:
              data = yaml.safe_load(f)
          tmp = tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False)
          json.dump(data, tmp)
          tmp.close()
          result = subprocess.run(
              ["ajv", "validate", "-s", "schemas/velocity-config.schema.json", "-d", tmp.name, "--spec=draft7"],
              capture_output=True, text=True
          )
          os.unlink(tmp.name)
          if result.returncode != 0:
              print(f"::error::velocity-config.yml failed schema validation:\n{result.stderr or result.stdout}")
              sys.exit(1)
          print("velocity-config.yml — schema valid")
          PY
          else
            echo "No .velocity/velocity-config.yml found. Skipping."
          fi

      - name: Validate skill YAML frontmatter in .velocity/skills/
        run: |
          if [ -d ".velocity/skills" ]; then
            python3 - <<'PY'
          import sys, os, re, json, subprocess, tempfile, glob

          errors = []
          schema = "schemas/skill.schema.json"
          for filepath in glob.glob(".velocity/skills/*.md"):
              with open(filepath) as f:
                  content = f.read()
              match = re.match(r"^---\n(.*?)\n---", content, re.DOTALL)
              if not match:
                  continue  # No frontmatter — not a validated skill
              try:
                  import yaml
                  data = yaml.safe_load(match.group(1))
              except Exception as e:
                  errors.append(f"{filepath}: YAML parse error — {e}")
                  continue
              tmp = tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False)
              json.dump(data, tmp)
              tmp.close()
              result = subprocess.run(
                  ["ajv", "validate", "-s", schema, "-d", tmp.name, "--spec=draft7"],
                  capture_output=True, text=True
              )
              os.unlink(tmp.name)
              if result.returncode != 0:
                  errors.append(f"{filepath}: {result.stderr or result.stdout}")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          print(f"All .velocity/skills/*.md frontmatter validated against skill.schema.json")
          PY
          else
            echo "No .velocity/skills/ directory found. Skipping skill validation."
          fi

      - name: Validate guardrails against guardrails schema
        run: |
          if [ -f ".velocity/guardrails/default.md" ]; then
            python3 - <<'PY'
          import sys, re, json, subprocess, tempfile, os
          try:
              import yaml
          except ImportError:
              sys.exit(0)
          with open(".velocity/guardrails/default.md") as f:
              content = f.read()
          match = re.match(r"^---\n(.*?)\n---", content, re.DOTALL)
          if not match:
              print("::warning::No YAML frontmatter in guardrails/default.md")
              sys.exit(0)
          data = yaml.safe_load(match.group(1))
          tmp = tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False)
          json.dump(data, tmp)
          tmp.close()
          result = subprocess.run(
              ["ajv", "validate", "-s", "schemas/guardrails.schema.json", "-d", tmp.name, "--spec=draft7"],
              capture_output=True, text=True
          )
          os.unlink(tmp.name)
          if result.returncode != 0:
              print(f"::error::guardrails/default.md failed schema validation:\n{result.stderr or result.stdout}")
              sys.exit(1)
          print("guardrails/default.md — schema valid")
          PY
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Guardrail Validation (runs on every PR)
  # ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Velocity Guardrails
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for diff analysis

      - name: Read guardrail config
        id: guardrails
        run: |
          if [ -f ".velocity/guardrails/default.md" ]; then
            echo "config_exists=true" >> $GITHUB_OUTPUT
          else
            echo "config_exists=false" >> $GITHUB_OUTPUT
            echo "::warning::No .velocity/guardrails/default.md found. Skipping guardrail checks."
          fi

      - name: Check vertical slice (no horizontal-only PRs)
        if: steps.guardrails.outputs.config_exists == 'true'
        run: |
          # Detect horizontal-only PRs by checking if changed files span multiple layers
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Count layer hits
          HAS_MIGRATION=$(echo "$CHANGED_FILES" | grep -c "migration\|schema\|flyway\|liquibase" || true)
          HAS_API=$(echo "$CHANGED_FILES" | grep -c "controller\|route\|handler\|resolver\|endpoint" || true)
          HAS_UI=$(echo "$CHANGED_FILES" | grep -c "component\|page\|view\|screen\|\.tsx\|\.jsx" || true)
          HAS_SERVICE=$(echo "$CHANGED_FILES" | grep -c "service\|domain\|usecase\|command\|query" || true)
          HAS_TEST=$(echo "$CHANGED_FILES" | grep -c "\.test\.\|\.spec\.\|_test\.\|Test\." || true)

          LAYER_COUNT=0
          [ "$HAS_MIGRATION" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))
          [ "$HAS_API" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))
          [ "$HAS_UI" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))
          [ "$HAS_SERVICE" -gt 0 ] && LAYER_COUNT=$((LAYER_COUNT + 1))

          if [ "$LAYER_COUNT" -eq 1 ] && [ "$HAS_TEST" -eq 0 ]; then
            echo "::error::Velocity Guardrail: This PR appears to touch only one layer without tests."
            echo "::error::Velocity requires vertical slices: each PR must span all layers it touches (UI + API + persistence + tests)."
            echo "::error::If this is intentionally a single-layer PR, add tests and ensure other layers are covered in the same PR."
            exit 1
          fi

      - name: Check tests exist for changed source files
        if: steps.guardrails.outputs.config_exists == 'true'
        run: |
          CHANGED_SOURCE=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -v "test\|spec\|__test__" | grep "\.\(ts\|tsx\|js\|jsx\|py\|java\|go\|rb\)$" || true)
          if [ -n "$CHANGED_SOURCE" ]; then
            MISSING_TESTS=""
            while IFS= read -r file; do
              # Simple heuristic: check for a corresponding test file
              basename="${file%.*}"
              if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "${basename}\.test\.\|${basename}\.spec\.\|${basename}_test\.\|Test${basename##*/}"; then
                MISSING_TESTS="$MISSING_TESTS\n  $file"
              fi
            done <<< "$CHANGED_SOURCE"
            
            if [ -n "$MISSING_TESTS" ]; then
              echo "::warning::Velocity Guardrail: The following changed source files may be missing test coverage:$MISSING_TESTS"
              echo "::warning::Ensure tests exist for every behavior change in this PR."
            fi
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Tier 1 Regeneration (runs on push to main with qualifying changes)
  # ─────────────────────────────────────────────────────────────────────────────
  regenerate:
    name: Velocity Asset Regeneration
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect trigger type
        id: trigger
        run: |
          CHANGED=$(git diff --name-only HEAD~1...HEAD 2>/dev/null || echo "")

          DEPENDENCY_CHANGE=false
          STRUCTURAL_CHANGE=false
          GUARDRAIL_CHANGE=false
          CONTEXT_CHANGE=false

          echo "$CHANGED" | grep -qE "^(package\.json|pom\.xml|go\.mod|requirements\.txt|Gemfile|Cargo\.toml|build\.gradle)" && DEPENDENCY_CHANGE=true || true
          echo "$CHANGED" | grep -qE "^(services/|apps/|packages/)" && STRUCTURAL_CHANGE=true || true
          echo "$CHANGED" | grep -q "CONTEXT\.md" && CONTEXT_CHANGE=true || true
          echo "$CHANGED" | grep -q "^\.velocity/artifacts/adrs/" && CONTEXT_CHANGE=true || true
          echo "$CHANGED" | grep -q "^\.velocity/guardrails/" && GUARDRAIL_CHANGE=true || true

          echo "dependency_change=$DEPENDENCY_CHANGE" >> $GITHUB_OUTPUT
          echo "structural_change=$STRUCTURAL_CHANGE" >> $GITHUB_OUTPUT
          echo "guardrail_change=$GUARDRAIL_CHANGE" >> $GITHUB_OUTPUT
          echo "context_change=$CONTEXT_CHANGE" >> $GITHUB_OUTPUT

          if $DEPENDENCY_CHANGE || $STRUCTURAL_CHANGE || $GUARDRAIL_CHANGE || $CONTEXT_CHANGE || ${{ github.event.inputs.force_full_regeneration == 'true' }}; then
            echo "should_regenerate=true" >> $GITHUB_OUTPUT
          else
            echo "should_regenerate=false" >> $GITHUB_OUTPUT
          fi

      - name: Log trigger reasons
        if: steps.trigger.outputs.should_regenerate == 'true'
        run: |
          echo "Velocity regeneration triggered by:"
          [ "${{ steps.trigger.outputs.dependency_change }}" == "true" ] && echo "  - Dependency manifest change"
          [ "${{ steps.trigger.outputs.structural_change }}" == "true" ] && echo "  - Structural change (new service/module)"
          [ "${{ steps.trigger.outputs.guardrail_change }}" == "true" ] && echo "  - Guardrail configuration change"
          [ "${{ steps.trigger.outputs.context_change }}" == "true" ] && echo "  - CONTEXT.md or ADR change"
          [ "${{ github.event.inputs.force_full_regeneration }}" == "true" ] && echo "  - Manual force regeneration"

      - name: Create regeneration notification
        if: steps.trigger.outputs.should_regenerate == 'true'
        run: |
          # Write a regeneration notice to .velocity/
          mkdir -p .velocity
          cat > .velocity/REGEN_NOTICE.md << EOF
          # Velocity Regeneration Notice

          **Triggered:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Commit:** ${{ github.sha }}
          **Trigger:** Tier 1 file-based (${{ steps.trigger.outputs.dependency_change == 'true' && 'dependency_change, ' || '' }}${{ steps.trigger.outputs.structural_change == 'true' && 'structural_change, ' || '' }}${{ steps.trigger.outputs.guardrail_change == 'true' && 'guardrail_change, ' || '' }}${{ steps.trigger.outputs.context_change == 'true' && 'context_change' || '' }})

          A qualifying change was detected. Run \`/sync\` in your AI coding assistant to regenerate Velocity assets with the latest stack intelligence.

          This notice will be removed after the next successful \`/sync\` run.
          EOF

          git config user.name "Velocity CI"
          git config user.email "velocity-ci@noreply.github.com"
          git add .velocity/REGEN_NOTICE.md
          git diff --staged --quiet || git commit -m "chore: Velocity regeneration notice — Tier 1 trigger detected"
          git push

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Scheduled Tier 2 Scan Notification (weekly)
  # ─────────────────────────────────────────────────────────────────────────────
  tier2-scan:
    name: Velocity Tier 2 Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Tier 2 signals
        run: |
          echo "Velocity weekly Tier 2 scan"
          echo ""
          echo "Tier 2 signals require semantic analysis — they cannot be reliably detected by file diff alone."
          echo ""
          echo "Run /sync in your AI coding assistant to perform the full semantic re-scan."
          echo ""
          echo "Tier 2 signals to check for:"
          echo "  - New API style adopted (REST → GraphQL)"
          echo "  - New messaging pattern (first Kafka producer/consumer)"
          echo "  - New persistence layer (SQL → NoSQL)"
          echo "  - New architectural pattern (first event sourcing aggregate)"
          echo "  - Significant CONTEXT.md growth"
          echo ""
          echo "If significant changes are found, Velocity will update agents and skills accordingly."
