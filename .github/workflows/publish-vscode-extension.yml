name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # triggers on: git tag v1.0.0 && git push --tags

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - uses: actions/checkout@v4

      # Copy the bundled skill files into the extension directory so vsce packages them.
      - name: Copy Velocity skill files into extension
        run: |
          mkdir -p skills/init skills/sync skills/validate
          mkdir -p templates/local-install
          cp ../skills/init/SKILL.md      skills/init/SKILL.md
          cp ../skills/sync/SKILL.md      skills/sync/SKILL.md
          cp ../skills/validate/SKILL.md  skills/validate/SKILL.md
          cp ../templates/local-install/README.md   templates/local-install/README.md
          cp ../templates/local-install/manifest.yml templates/local-install/manifest.yml
        working-directory: vscode-extension

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json

      - run: npm ci

      - name: Build extension
        run: npm run build

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --pat "$VSCE_PAT"
