name: Build Plugins

on:
  pull_request:
    paths:
      - "skills/**"
      - "agents/**"
      - "templates/**"
      - "schemas/**"
      - "hooks.json"
      - "plugins/velocity/**"
      - "tools/plugin-builder/**"
      - ".github/workflows/build-plugins.yml"
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  check:
    name: Typecheck plugin builder
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: tools/plugin-builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/plugin-builder/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Rebuild bundles on release tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    defaults:
      run:
        working-directory: tools/plugin-builder
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/plugin-builder/package-lock.json
      - run: npm ci
      - run: npm run build:plugins
      - name: Commit and push built plugin bundles
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f plugins/dist/
          git add .claude-plugin/marketplace.json .cursor-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: rebuild plugin bundles for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main
