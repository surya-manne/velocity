name: Build Plugins

on:
  pull_request:
    paths:
      - "skills/**"
      - "agents/**"
      - "templates/**"
      - "schemas/**"
      - "hooks.json"
      - "plugins/velocity/**"
      - "tools/plugin-builder/**"
      - ".github/workflows/build-plugins.yml"
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  check:
    name: Verify generated bundles are up to date
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: tools/plugin-builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/plugin-builder/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Fails if plugins/dist or marketplace manifests are stale.
      - run: npm run check

  build:
    name: Rebuild bundles on release tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: tools/plugin-builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/plugin-builder/package-lock.json
      - run: npm ci
      - run: npm run build:plugins
      - name: Upload plugin bundles
        uses: actions/upload-artifact@v4
        with:
          name: velocity-plugins
          path: |
            plugins/dist/**
            .claude-plugin/marketplace.json
            .cursor-plugin/marketplace.json
