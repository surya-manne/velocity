name: Build Plugins

on:
  pull_request:
    paths:
      - "core/**"
      - "plugins/velocity/**"
      - "packages/plugin-builder/**"
      - ".github/workflows/build-plugins.yml"
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  check:
    name: Typecheck plugin builder
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: packages/plugin-builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/plugin-builder/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Build plugin bundles on release tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/plugin-builder
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/plugin-builder/package-lock.json
      - run: npm ci
      - run: npm run build:plugins
      - name: Upload plugin bundles as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-bundles-${{ github.ref_name }}
          path: |
            plugins/dist/
            .claude-plugin/marketplace.json
            .cursor-plugin/marketplace.json
